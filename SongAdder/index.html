<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#CDB2EB">
    <title>Song Adder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Song Adder</h1>

    <input type="text" id="songName" placeholder="Playlist...">
    
    <div class="section" data-section="0">
      <div class="buttons">
          <button class="addRowBtn">+ Add Row</button>
          <button class="clearBtn">Clear</button>
          </div>
          <div class="rows"></div>
          <div class="result">Total: 0:00</div>
    </div>

    <div class="section" data-section="1">
      <div class="buttons">
        <button class="addRowBtn">+ Add Row</button>
        <button class="clearBtn">Clear</button>
      </div>
      <div class="rows"></div>
      <div class="result">Total: 0:00</div>
    </div>

    <div id="grandTotal">Grand Total: 0:00</div>
    </div>

    <script>
                const songNameInput = document.getElementById('songName');
                const grandTotal = document.getElementById('grandTotal');
                const sections = document.querySelectorAll('.section');

                songNameInput.addEventListener('input', saveData);

                function createRow(section) {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <input type="number" class="min" min="0" placeholder="0">
                <label>:</label>
                <input type="number" class="sec" min="0" max="59" placeholder="00">
                <button class="delete-btn" title="Delete row" tabindex="-1">🗑️</button>
            `;
            row.querySelector('.delete-btn').addEventListener('click', () => {
                row.remove();
              calculateAll();
              saveData();
            });
            row.querySelectorAll('input').forEach(input => {
              input.addEventListener('input', () => { calculateAll(); saveData(); });
            });
                section.querySelector('.rows').appendChild(row);
        }

                function calculateSection(section) {
            let totalSeconds = 0;
                section.querySelectorAll('.row').forEach(row => {
                const min = parseInt(row.querySelector('.min').value) || 0;
                const sec = parseInt(row.querySelector('.sec').value) || 0;
                totalSeconds += min * 60 + sec;
            });
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
                            section.querySelector('.result').innerHTML = `${mins}:${String(secs).padStart(2, '0')}`;
                            return totalSeconds;
                          }

                          function calculateAll() {
                            let grandSeconds = 0;
                            sections.forEach(section => {
                              grandSeconds += calculateSection(section);
                            });
                            const mins = Math.floor(grandSeconds / 60);
                            const secs = grandSeconds % 60;
                            grandTotal.innerHTML = `${mins}:${String(secs).padStart(2, '0')}`;
                          }

                          function saveData() {
                            const data = [];
                            sections.forEach(section => {
                              const rows = [];
                              section.querySelectorAll('.row').forEach(row => {
                                rows.push({
                                  min: row.querySelector('.min').value,
                                  sec: row.querySelector('.sec').value
                                });
                              });
                              data.push(rows);
                            });
                            localStorage.setItem('songAdderSections', JSON.stringify(data));
                            localStorage.setItem('songAdderName', songNameInput.value);
                          }

                          function loadData() {
                            songNameInput.value = localStorage.getItem('songAdderName') || '';
                            const data = localStorage.getItem('songAdderSections');
                            if (data) {
                              const allSections = JSON.parse(data);
                              allSections.forEach((rows, i) => {
                                if (sections[i]) {
                                  rows.forEach(r => {
                                    createRow(sections[i]);
                                    const row = sections[i].querySelector('.rows').lastElementChild;
                                    row.querySelector('.min').value = r.min;
                                    row.querySelector('.sec').value = r.sec;
                                  });
                                }
                              });
                            } else {
                              sections.forEach(section => {
                                createRow(section);
                                createRow(section);
                              });
                            }
                            calculateAll();
        }

                sections.forEach(section => {
                  section.querySelector('.addRowBtn').addEventListener('click', () => {
                    createRow(section);
                    saveData();
                  });
                  section.querySelector('.clearBtn').addEventListener('click', () => {
                    section.querySelectorAll('input').forEach(input => input.value = '');
                    calculateAll();
                    saveData();
                  });
        });

                loadData();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
