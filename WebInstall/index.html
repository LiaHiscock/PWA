<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Web Install Sample for an IFrame</title>
  </head>
    <h2>Frame me</h2>
    <p>Executes:</p>
    <pre><code>
      navigator.install("https://kbhlee2121.github.io/pwa/web-install/index.html");
    </code></pre>
    <button id="navigatorButton">Install</button>
    <p>Executes:</p>
    <pre><code>
      &lt;install installurl="https://mustjab.github.io/"&gt;&lt;/install&gt;
    </code></pre>
    <install installurl="https://mustjab.github.io/"></install>

    <p>Executes:</p>
    <pre><code>
      &lt;geolocation&gt;&lt;/geolocation&gt;
    </code></pre>
    <geolocation onlocation="console.log('Location updated');"></geolocation>
  </body>
  <script src="app.js"></script>
</html>
